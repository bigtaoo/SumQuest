name: iOS Build & TestFlight

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    env:
      PROJECT_PATH: SumQuest
      BUILD_PATH: build/ios
      IOS_PROJECT_PATH: build/ios/iOS/SumQuest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Cache Unity Library
      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-${{ hashFiles('SumQuest/Assets/**','SumQuest/Packages/**','SumQuest/ProjectSettings/**') }}
          restore-keys: |
            Library-

      # 3️⃣ Build Unity iOS project
      - name: Build Unity iOS Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          targetPlatform: iOS
          buildName: SumQuest
          buildsPath: ${{ env.BUILD_PATH }}

      #- name: Show build structure
      #  run: ls -R ${{ env.BUILD_PATH }}

      # Set automatic build number
      - name: Set automatic build number
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleVersion $BUILD_NUMBER" \
            ${{ env.IOS_PROJECT_PATH }}/Info.plist
      
      # Prefer Xcode 16.4 (iOS 18.5 SDK) if available
      - name: Select Xcode
        run: |
          if [ -d "/Applications/Xcode_16.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app
          else
            sudo xcode-select -s /Applications/Xcode.app
          fi
          xcodebuild -version
          xcodebuild -showsdks

      # Install distribution certificate
      - name: Install certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
        run: |
          echo $CERTIFICATE_BASE64 | base64 --decode > cert.p12
          security create-keychain -p github actions.keychain
          security import cert.p12 -k "$HOME/Library/Keychains/actions.keychain" -P "${{ secrets.IOS_CERT_PASSWORD }}" -T /usr/bin/codesign
          security list-keychains -s "$HOME/Library/Keychains/actions.keychain"
          security default-keychain -s "$HOME/Library/Keychains/actions.keychain"
          security unlock-keychain -p github "$HOME/Library/Keychains/actions.keychain"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k github "$HOME/Library/Keychains/actions.keychain"

      # Install provisioning profile
      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          echo "$PROFILE_BASE64" | base64 --decode > profile.mobileprovision

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(/usr/libexec/PlistBuddy -c Print:UUID /dev/stdin <<< "$(security cms -D -i profile.mobileprovision)")
          cp profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "Installed provisioning profile UUID: $UUID"
          echo "Profile name:"
          security cms -D -i profile.mobileprovision | grep -A1 "<key>Name</key>"
      
      # Keep keychain unlocked & show identity
      - name: Keep keychain unlocked + verify identity
        run: |
          security set-keychain-settings -lut 21600 "$HOME/Library/Keychains/actions.keychain"
          security unlock-keychain -p github "$HOME/Library/Keychains/actions.keychain"
          echo "== Codesigning identities in actions.keychain =="
          security find-identity -v -p codesigning "$HOME/Library/Keychains/actions.keychain" || true

      - name: Check provisioning profile
        run: |
          security find-identity -v -p codesigning
          security cms -D -i profile.mobileprovision | grep -A2 "Name"
          security cms -D -i profile.mobileprovision | grep -A5 Entitlements

      # WWDR intermediate (defensive)
      - name: Install Apple WWDR intermediate (optional)
        run: |
          curl -fsSL https://www.apple.com/certificateauthority/AppleWWDRCAG4.cer -o AppleWWDRCAG4.cer
          sudo security add-trusted-cert -d -r trustRoot -k /Library/Keychains/System.keychain AppleWWDRCAG4.cer || true

      # Patch signing per target:
      # Unity-iPhone -> Manual + Apple Distribution + profile "tankium"
      # UnityFramework -> Manual + Apple Distribution, NO provisioning profile
      - name: Patch signing per target
        run: |
          cd ${{ env.IOS_PROJECT_PATH }}

          gem install xcodeproj --no-document
          ruby - <<'RUBY'
            require 'xcodeproj'
            proj_path = 'Unity-iPhone.xcodeproj'
            project   = Xcodeproj::Project.open(proj_path)

            TEAM_ID   = 'C677KJH544'
            PROFILE   = 'sumquest'
            APP_ID    = 'com.taowang.sumquest'

            app = project.targets.find { |t| t.name == 'Unity-iPhone' }
            fw  = project.targets.find { |t| t.name == 'UnityFramework' }
            raise 'Unity-iPhone target not found' unless app
            raise 'UnityFramework target not found' unless fw

            app.build_configurations.each do |cfg|
              s = cfg.build_settings
              s['DEVELOPMENT_TEAM']               = TEAM_ID
              s['CODE_SIGN_STYLE']                = 'Manual'
              s['CODE_SIGN_IDENTITY']             = 'Apple Distribution'
              s['PROVISIONING_PROFILE_SPECIFIER'] = PROFILE
              # s['PRODUCT_BUNDLE_IDENTIFIER']       = APP_ID
            end

            fw.build_configurations.each do |cfg|
              s = cfg.build_settings
              s['DEVELOPMENT_TEAM']   = TEAM_ID
              s['CODE_SIGN_STYLE']    = 'Manual'
              s['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
              s.delete('PROVISIONING_PROFILE_SPECIFIER')
              s.delete('PROVISIONING_PROFILE')
            end

            attrs = project.root_object.attributes['TargetAttributes'] ||= {}
            attrs[app.uuid] ||= {}
            attrs[app.uuid]['ProvisioningStyle'] = 'Manual'
            attrs[fw.uuid]  ||= {}
            attrs[fw.uuid]['ProvisioningStyle']  = 'Manual'

            project.save
          RUBY

      # Show effective signing (sanity)
      - name: Show signing (Unity-iPhone)
        run: |
          cd ${{ env.IOS_PROJECT_PATH }}
          xcodebuild -project Unity-iPhone.xcodeproj -target Unity-iPhone -showBuildSettings \
          | egrep -i 'CODE_SIGN|PROVISION|DEVELOPMENT_TEAM|PRODUCT_BUNDLE_IDENTIFIER' || true
      - name: Show signing (UnityFramework)
        run: |
          cd ${{ env.IOS_PROJECT_PATH }}
          xcodebuild -project Unity-iPhone.xcodeproj -target UnityFramework -showBuildSettings \
          | egrep -i 'CODE_SIGN|PROVISION|DEVELOPMENT_TEAM|PRODUCT_BUNDLE_IDENTIFIER' || true

      # Archive (force codesign to our keychain; also pass CURRENT_PROJECT_VERSION to ensure Xcode uses BN)
      - name: Archive
        run: |
          cd ${{ env.IOS_PROJECT_PATH }}

          xcodebuild \
            -workspace Unity-iPhone.xcworkspace \
            -scheme Unity-iPhone \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/SumQuest.xcarchive" \
            archive \
            OTHER_CODE_SIGN_FLAGS="--keychain $HOME/Library/Keychains/actions.keychain --timestamp=none" \
            COMPILER_INDEX_STORE_ENABLE=NO

      # Export IPA
      - name: Export IPA
        run: |
          cd ${{ env.IOS_PROJECT_PATH }}

          xcodebuild \
            -exportArchive \
            -archivePath "$PWD/build/SumQuest.xcarchive" \
            -exportOptionsPlist ${{ github.workspace }}/SumQuest/ExportOptions.plist \
            -exportPath "$PWD/build/output" \
            OTHER_CODE_SIGN_FLAGS="--keychain $HOME/Library/Keychains/actions.keychain --timestamp=none"
      
      # List output
      - name: List export folder
        run: |
          cd ${{ env.IOS_PROJECT_PATH }}

          echo "== build/output contents =="
          ls -lah build/output || true
          echo "== build tree =="
          find build -maxdepth 2 -type f | sed 's/^/  /'

      # Locate IPA
      - name: Locate IPA
        id: locate_ipa
        run: |
          cd ${{ env.IOS_PROJECT_PATH }}

          set -e
          IPA=$(ls -1 build/output/*.ipa 2>/dev/null | head -n 1 || true)
          if [ -z "$IPA" ]; then
            echo "::error ::No .ipa found in build/output/"
            exit 1
          fi
          echo "Found IPA: $IPA"
          echo "ipa_path=$IPA" >> "$GITHUB_OUTPUT"

      # 7) Upload to TestFlight (API key)
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ steps.locate_ipa.outputs.ipa_path }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_KEY }}

      # # Upload to TestFlight
      # - name: Upload to TestFlight
      #   env:
      #     APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
      #     APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
      #     APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY }}
      #   run: |
      #     IPA_PATH=$(find ${{ env.BUILD_PATH }} -name "*.ipa" | head -n 1)

      #     mkdir private_keys
      #     echo "$APPSTORE_API_KEY" > private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8

      #     xcrun altool \
      #       --upload-app \
      #       --type ios \
      #       --file "$IPA_PATH" \
      #       --apiKey $APPSTORE_API_KEY_ID \
      #       --apiIssuer $APPSTORE_ISSUER_ID

      # Return Unity license
